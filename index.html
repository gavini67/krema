  <!-- Mobile enhancers: carousel pagination dots + sticky quick-action bar -->
  <script>
  (function () {
    var DIRECTIONS = 'https://maps.google.com/?q=Krema+Dessert+Haus,+Parqal+Mall,+Aseana+Ave,+Paranaque+City,+Philippines';
    var IG = 'https://instagram.com/kremadesserthaus';
    function isMobile() { return window.matchMedia('(max-width: 760px)').matches; }
    var CAROUSELS = ['.kh-menu-grid', '.kh-events-grid', '.kh-reviews-grid', '.kh-community-wall'];

    // pagination dots under each mobile swipe-row
    function buildDots() {
      if (!isMobile()) return;
      CAROUSELS.forEach(function (sel) {
        var row = document.querySelector(sel);
        if (!row || row.__dots) return;
        var items = row.children;
        if (items.length < 2) return;
        var dots = document.createElement('div');
        dots.className = 'kh-dots';
        var arr = [];
        for (var i = 0; i < items.length; i++) {
          var d = document.createElement('button');
          d.type = 'button';
          d.className = 'kh-dot' + (i ? '' : ' is-active');
          d.setAttribute('aria-label', 'Go to item ' + (i + 1));
          (function (idx) {
            d.addEventListener('click', function () {
              var t = items[idx];
              row.scrollTo({ left: t.offsetLeft - row.offsetLeft, behavior: 'smooth' });
            });
          })(i);
          dots.appendChild(d);
          arr.push(d);
        }
        row.parentNode.insertBefore(dots, row.nextSibling);
        var raf = null;
        function update() {
          var center = row.scrollLeft + row.clientWidth / 2, best = 0, bd = 1e9;
          for (var j = 0; j < items.length; j++) {
            var it = items[j], c = (it.offsetLeft - row.offsetLeft) + it.offsetWidth / 2, dist = Math.abs(c - center);
            if (dist < bd) { bd = dist; best = j; }
          }
          for (var k = 0; k < arr.length; k++) arr[k].classList.toggle('is-active', k === best);
        }
        row.addEventListener('scroll', function () {
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(update);
        }, { passive: true });
        row.__dots = true;
      });
    }

    // sticky bottom bar: appears after the hero, hides over the footer
    function buildBar() {
      if (document.getElementById('kh-mobile-bar')) return;
      var pin = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg>';
      var ig = '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="6"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>';
      var bar = document.createElement('div');
      bar.id = 'kh-mobile-bar';
      bar.className = 'kh-mobile-bar is-hidden';
      bar.innerHTML =
        '<a class="kh-btn kh-btn-sky" href="' + DIRECTIONS + '" target="_blank" rel="noreferrer">' + pin + 'Directions</a>' +
        '<a class="kh-btn kh-btn-ig" href="' + IG + '" target="_blank" rel="noreferrer">' + ig + 'Message us</a>';
      document.body.appendChild(bar);
      var hero = document.querySelector('#top') || document.querySelector('.kh-hero');
      var footer = document.querySelector('.kh-footer') || document.querySelector('footer');
      function apply() {
        if (!isMobile()) { bar.classList.add('is-hidden'); return; }
        var y = window.scrollY || document.documentElement.scrollTop || 0;
        var de = document.documentElement;
        var showAfter = hero ? hero.offsetHeight * 0.55 : 500;
        var footerZone = footer ? footer.offsetHeight * 0.55 : 220;
        var nearBottom = (y + window.innerHeight) >= (de.scrollHeight - footerZone);
        bar.classList.toggle('is-hidden', !(y > showAfter && !nearBottom));
      }
      window.addEventListener('scroll', apply, { passive: true });
      window.addEventListener('resize', apply);
      apply();
    }

    function init() { buildDots(); buildBar(); }
    var tries = 0;
    var t = setInterval(function () {
      tries++;
      if (document.querySelector('.kh-menu-grid') || tries > 50) { clearInterval(t); init(); }
    }, 120);
    window.addEventListener('resize', buildDots);
  })();
  </script>

  <script>
  /* Hero style picker — PRIVATE (remove once a look is chosen). Lives outside
     the React root and drives body[data-hero], so React never touches it. */
  (function () {
    var CKEY = 'kh_hero_style', DKEY = 'kh_hero_depth';
    var COLORS = [
      { v: 'navy',      label: 'Navy + white outline' },
      { v: 'cream',     label: 'Cream + black outline' },
      { v: 'creamnavy', label: 'Cream + navy outline' },
      { v: 'yellow',    label: 'Yellow + navy outline' },
      { v: 'purple',    label: 'Purple + navy outline' },
      { v: 'ghost',     label: 'Ghost (outline only)' }
    ];
    var DEPTHS = [
      { v: 'flat',    label: 'Flat' },
      { v: 'hard',    label: '3D' },
      { v: 'soft',    label: 'Soft' },
      { v: 'long',    label: 'Long' },
      { v: 'sticker', label: 'Sticker' }
    ];
    var picker = document.createElement('div');
    picker.id = 'hero-picker';
    function makeRow(label) {
      var r = document.createElement('div'); r.className = 'hp-row';
      var l = document.createElement('span'); l.className = 'hp-label'; l.textContent = label;
      r.appendChild(l); return r;
    }
    function mark(row, v) {
      Array.prototype.forEach.call(row.querySelectorAll('button'), function (b) {
        b.setAttribute('aria-pressed', b.getAttribute('data-v') === v ? 'true' : 'false');
      });
    }
    var colorRow = makeRow('color'), depthRow = makeRow('depth');
    function applyColor(v) { document.body.setAttribute('data-hero', v); try { localStorage.setItem(CKEY, v); } catch (e) {} mark(colorRow, v); }
    function applyDepth(v) { document.body.setAttribute('data-depth', v); try { localStorage.setItem(DKEY, v); } catch (e) {} mark(depthRow, v); }
    COLORS.forEach(function (s) {
      var b = document.createElement('button'); b.className = 'hp-color';
      b.setAttribute('data-v', s.v); b.title = s.label; b.setAttribute('aria-label', s.label);
      b.addEventListener('click', function () { applyColor(s.v); });
      colorRow.appendChild(b);
    });
    DEPTHS.forEach(function (s) {
      var b = document.createElement('button'); b.className = 'hp-depth';
      b.setAttribute('data-v', s.v); b.textContent = s.label; b.title = s.label;
      b.addEventListener('click', function () { applyDepth(s.v); });
      depthRow.appendChild(b);
    });
    picker.appendChild(colorRow); picker.appendChild(depthRow);
    document.body.appendChild(picker);
    var c = 'navy', d = 'flat';
    try { c = localStorage.getItem(CKEY) || 'navy'; d = localStorage.getItem(DKEY) || 'flat'; } catch (e) {}
    applyColor(c); applyDepth(d);
  })();
  </script>
